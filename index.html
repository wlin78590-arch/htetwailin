<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Pro H · Read Only</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      padding: 12px;
      transition: background 0.2s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .dark body { background: #0b1120; }

    /* ===== GLASS ===== */
    .glass {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 20px rgba(60,100,200,0.06);
      transition: background 0.15s ease, border 0.15s ease, box-shadow 0.15s ease, transform 0.2s ease;
    }
    .dark .glass {
      background: rgba(20,30,60,0.5);
      border-color: rgba(255,255,255,0.05);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .glass-dark {
      background: rgba(20,30,60,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
      color: #f0f4ff;
    }
    .dark .glass-dark {
      background: rgba(12,18,40,0.7);
      border-color: rgba(255,255,255,0.03);
    }

    /* ===== CARDS ===== */
    .card {
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
      position: relative;
      will-change: transform;
    }
    .card:active { transform: scale(0.98); }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px -10px rgba(60,80,200,0.18);
      border-color: rgba(79,131,255,0.25);
    }
    .dark .card:hover {
      box-shadow: 0 12px 32px -10px rgba(60,80,200,0.1);
      border-color: rgba(79,131,255,0.15);
    }
    .card-enter {
      animation: cardSlide 0.2s ease forwards;
      opacity: 0;
    }
    @keyframes cardSlide {
      from { opacity:0; transform:translateY(10px) scale(0.98); }
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ===== ICON ===== */
    .icon-bg {
      background: rgba(79,124,255,0.1);
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 1.1rem;
      color: #2b4eb0;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.2s ease;
    }
    .dark .icon-bg {
      background: rgba(79,124,255,0.12);
      color: #8aadff;
    }
    .card:hover .icon-bg { background: rgba(79,124,255,0.18); }

    /* ===== BADGES ===== */
    .tag {
      background: rgba(79,124,255,0.08);
      color: #1f3a8a;
      font-size: 0.55rem;
      padding: 0.05rem 0.45rem;
      border-radius: 20px;
      display: inline-block;
      border: 1px solid rgba(79,124,255,0.04);
      transition: background 0.1s ease;
    }
    .dark .tag {
      background: rgba(79,124,255,0.1);
      color: #b8caff;
      border-color: rgba(79,124,255,0.06);
    }
    .lock-badge {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      font-size: 0.45rem;
      padding: 0.05rem 0.35rem;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 0.1rem;
      border: 1px solid rgba(239,68,68,0.1);
    }
    .dark .lock-badge {
      background: rgba(239,68,68,0.12);
      color: #f87171;
    }
    .personal-badge {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-size: 0.45rem;
      padding: 0.05rem 0.4rem;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 0.1rem;
      font-weight: 600;
      border: 1px solid rgba(255,210,0,0.2);
    }
    .dark .personal-badge {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #0b1120;
    }
    .hidden-badge {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: #fff;
      font-size: 0.45rem;
      padding: 0.05rem 0.4rem;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 0.1rem;
      font-weight: 600;
      border: 1px solid rgba(139,92,246,0.3);
    }
    .readonly-badge {
      background: rgba(79,124,255,0.06);
      color: #4f7cff;
      font-size: 0.55rem;
      padding: 0.1rem 0.5rem;
      border-radius: 20px;
      border: 1px solid rgba(79,124,255,0.08);
    }
    .dark .readonly-badge {
      background: rgba(79,124,255,0.08);
      color: #8aadff;
      border-color: rgba(79,124,255,0.1);
    }
    .download-badge {
      background: rgba(34,197,94,0.08);
      color: #16a34a;
      font-size: 0.45rem;
      padding: 0.05rem 0.35rem;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 0.1rem;
      border: 1px solid rgba(34,197,94,0.08);
      cursor: pointer;
      transition: background 0.1s ease, transform 0.15s ease;
    }
    .dark .download-badge {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border-color: rgba(34,197,94,0.1);
    }
    .download-badge:active { transform: scale(0.94); }

    /* ===== HIDDEN LINKS BUTTON ===== */
    .hidden-toggle-btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hidden-toggle-btn:active { transform: scale(0.94); }
    .hidden-toggle-btn:hover {
      box-shadow: 0 4px 16px rgba(139,92,246,0.4);
    }
    .hidden-toggle-btn.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }
    .hidden-toggle-btn.active:hover {
      box-shadow: 0 4px 16px rgba(239,68,68,0.4);
    }

    /* ===== INPUTS ===== */
    input, select {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      width: 100%;
      font-size: 0.85rem;
      transition: border 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .dark input, .dark select {
      background: rgba(20,30,65,0.4);
      border-color: rgba(255,255,255,0.05);
      color: #eef2ff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4f7cff;
      box-shadow: 0 0 0 3px rgba(79,124,255,0.1);
      transform: scale(1.005);
    }
    input::placeholder { color: #9aa5c0; }
    .dark input::placeholder { color: #5a6a8a; }

    /* ===== STATS ===== */
    .stat-number {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
    }
    @media (min-width: 640px) { .stat-number { font-size: 2rem; } }

    /* ===== BRAND ===== */
    .brand-gradient {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-glow { text-shadow: 0 0 40px rgba(255,210,0,0.08); }

    /* ===== MODAL ===== */
    .modal-overlay {
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:scale(0.97); }
      to { opacity:1; transform:scale(1); }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #b0c8ff; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(79,124,255,0.2); }

    /* ===== UTILITY ===== */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spinner {
      border: 3px solid rgba(79,124,255,0.06);
      border-top: 3px solid #4f7cff;
      border-radius: 50%;
      width: 28px; height: 28px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .btn-reset {
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .btn-reset:active { transform: scale(0.94); }
    .btn-theme {
      transition: transform 0.15s ease;
    }
    .btn-theme:active { transform: scale(0.94); }
    .download-option-btn {
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .download-option-btn:active { transform: scale(0.96); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      body { padding: 8px; }
      .stat-number { font-size: 1.4rem; }
      .card { padding: 10px; }
      .icon-bg { width: 32px; height: 32px; font-size: 0.9rem; }
      input, select { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
      .hidden-toggle-btn { font-size: 0.6rem; padding: 3px 10px; }
    }
  </style>
</head>
<body>
<div id="root" class="max-w-7xl mx-auto">

  <!-- ===== HEADER ===== -->
  <div class="flex flex-wrap items-center justify-between mb-3 gap-2">
    <div class="flex items-center gap-2">
      <div class="text-xl md:text-2xl font-bold tracking-tight brand-gradient brand-glow">
        <i class="fas fa-bolt text-yellow-500 mr-1"></i>Pro H
      </div>
      <span class="readonly-badge text-xs">📖 Read Only</span>
    </div>
    <div class="flex items-center gap-1.5 flex-wrap">
      <!-- Hidden Links Toggle Button -->
      <button onclick="toggleHiddenLinks()" id="hiddenToggleBtn" class="hidden-toggle-btn">
        <i class="fas fa-eye"></i> <span id="hiddenBtnText">Hidden</span>
      </button>
      <button onclick="toggleDark()" class="btn-theme glass px-2.5 py-1.5 rounded-lg text-sm flex items-center gap-1">
        <i class="fas fa-sun text-yellow-500 dark:hidden text-xs"></i>
        <i class="fas fa-moon hidden dark:inline text-indigo-300 text-xs"></i>
        <span class="hidden sm:inline text-[0.65rem] dark:text-white">Theme</span>
      </button>
      <span class="readonly-badge text-[0.55rem] hidden xs:inline"><i class="fas fa-lock mr-0.5"></i> Read Only</span>
      <button onclick="resetToDefault()" class="btn-reset glass px-2.5 py-1.5 rounded-lg text-sm flex items-center gap-1 text-red-500 hover:text-red-600 dark:text-red-400">
        <i class="fas fa-redo text-[0.65rem]"></i>
        <span class="hidden sm:inline text-[0.65rem]">Reset</span>
      </button>
    </div>
  </div>

  <!-- ===== STATS ===== -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
    <div class="glass rounded-xl p-2.5 card card-enter" style="animation-delay:0.02s">
      <div class="text-[0.6rem] text-gray-500 dark:text-gray-400 flex items-center gap-1"><i class="fas fa-link text-blue-400 text-xs"></i> Total</div>
      <div class="stat-number text-gray-800 dark:text-white" id="totalCount">0</div>
    </div>
    <div class="glass rounded-xl p-2.5 card card-enter" style="animation-delay:0.04s">
      <div class="text-[0.6rem] text-gray-500 dark:text-gray-400 flex items-center gap-1"><i class="fas fa-tags text-indigo-400 text-xs"></i> Categories</div>
      <div class="stat-number text-gray-800 dark:text-white" id="categoryCount">0</div>
    </div>
    <div class="glass rounded-xl p-2.5 card card-enter" style="animation-delay:0.06s">
      <div class="text-[0.6rem] text-gray-500 dark:text-gray-400 flex items-center gap-1"><i class="fas fa-star text-yellow-400 text-xs"></i> Favorites</div>
      <div class="stat-number text-gray-800 dark:text-white" id="favCount">0</div>
    </div>
    <div class="glass rounded-xl p-2.5 card card-enter" style="animation-delay:0.08s">
      <div class="text-[0.6rem] text-gray-500 dark:text-gray-400 flex items-center gap-1"><i class="fas fa-clock text-purple-400 text-xs"></i> Newest</div>
      <div class="text-xs font-medium text-gray-700 dark:text-gray-300 truncate" id="newestLabel">—</div>
    </div>
  </div>

  <!-- ===== SEARCH + FILTER ===== -->
  <div class="glass rounded-xl p-2.5 mb-3 flex flex-wrap items-center gap-1.5 dark:glass-dark card-enter" style="animation-delay:0.1s">
    <div class="flex-1 min-w-[120px] relative">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-xs"></i>
      <input type="text" id="searchInput" placeholder="Search links..." class="pl-7 pr-2 py-1.5 rounded-lg w-full border-0 bg-white/30 dark:bg-black/20 text-sm dark:text-white dark:placeholder-gray-500 focus:ring-0">
    </div>
    <select id="categoryFilter" class="w-auto min-w-[90px] py-1.5 rounded-lg border-0 bg-white/30 dark:bg-black/20 text-sm dark:text-white appearance-none cursor-pointer">
      <option value="all">All cats</option>
    </select>
    <select id="sortFilter" class="w-auto min-w-[80px] py-1.5 rounded-lg border-0 bg-white/30 dark:bg-black/20 text-sm dark:text-white appearance-none cursor-pointer">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A–Z</option>
    </select>
    <button onclick="clearFilters()" class="text-[0.6rem] text-gray-400 hover:text-blue-500 dark:text-gray-500 dark:hover:text-blue-400 px-2 py-1 transition-colors">
      <i class="fas fa-times"></i> Reset
    </button>
  </div>

  <!-- ===== LINK GRID ===== -->
  <div id="loadingState" class="flex justify-center py-6"><div class="spinner"></div></div>
  <div id="linkGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 hidden"></div>
  <div id="emptyState" class="glass rounded-xl p-6 text-center mt-3 hidden dark:glass-dark card-enter">
    <i class="fas fa-link text-2xl text-blue-300/40 dark:text-blue-400/20 mb-1"></i>
    <p class="text-gray-500 dark:text-gray-400 text-sm">No links found.</p>
  </div>

  <!-- ===== FOOTER ===== -->
  <div class="text-center text-[0.5rem] text-gray-400 dark:text-gray-600 mt-4 pb-2">
    <i class="fas fa-shield-alt text-yellow-400 mr-0.5"></i>
    Read-only link hub · No edits allowed
  </div>
</div>

<!-- ===== PASSWORD MODAL (for individual links) ===== -->
<div id="linkPasswordModal" class="fixed inset-0 flex items-center justify-center p-4 modal-overlay hidden">
  <div class="glass rounded-xl max-w-xs w-full p-4 dark:glass-dark">
    <div class="text-center mb-3">
      <div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-2">
        <i class="fas fa-lock text-xl text-red-400"></i>
      </div>
      <h3 class="text-base font-bold text-gray-800 dark:text-white">Protected Link</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400">Enter password to access</p>
    </div>
    <input type="password" id="linkPasswordInput" placeholder="Enter password..." class="rounded-lg mb-2 text-sm dark:text-white" onkeydown="if(event.key==='Enter') verifyLinkPassword()">
    <div class="flex gap-2">
      <button onclick="closeLinkPasswordModal()" class="flex-1 px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
      <button onclick="verifyLinkPassword()" class="flex-1 px-3 py-1.5 rounded-lg bg-gradient-to-r from-yellow-400 to-orange-400 text-gray-800 font-semibold text-sm transition-transform active:scale-95">Unlock <i class="fas fa-unlock ml-0.5"></i></button>
    </div>
    <div id="linkPasswordError" class="text-red-500 text-xs text-center mt-2 hidden">❌ Wrong password!</div>
  </div>
</div>

<!-- ===== HIDDEN LINKS PASSWORD MODAL ===== -->
<div id="hiddenPasswordModal" class="fixed inset-0 flex items-center justify-center p-4 modal-overlay hidden">
  <div class="glass rounded-xl max-w-xs w-full p-4 dark:glass-dark">
    <div class="text-center mb-3">
      <div class="w-12 h-12 rounded-full bg-purple-500/10 flex items-center justify-center mx-auto mb-2">
        <i class="fas fa-eye-slash text-xl text-purple-400"></i>
      </div>
      <h3 class="text-base font-bold text-gray-800 dark:text-white">🔐 Hidden Links</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400">Enter password to reveal hidden links</p>
    </div>
    <input type="password" id="hiddenPasswordInput" placeholder="Enter password..." class="rounded-lg mb-2 text-sm dark:text-white" onkeydown="if(event.key==='Enter') verifyHiddenPassword()">
    <div class="flex gap-2">
      <button onclick="closeHiddenPasswordModal()" class="flex-1 px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
      <button onclick="verifyHiddenPassword()" class="flex-1 px-3 py-1.5 rounded-lg bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-semibold text-sm transition-transform active:scale-95">Unlock <i class="fas fa-unlock ml-0.5"></i></button>
    </div>
    <div id="hiddenPasswordError" class="text-red-500 text-xs text-center mt-2 hidden">❌ Wrong password!</div>
  </div>
</div>

<!-- ===== DOWNLOAD MODAL ===== -->
<div id="downloadModal" class="fixed inset-0 flex items-center justify-center p-4 modal-overlay hidden">
  <div class="glass rounded-xl max-w-xs w-full p-4 dark:glass-dark">
    <div class="text-center mb-3">
      <div class="w-12 h-12 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-2">
        <i class="fas fa-download text-xl text-green-400"></i>
      </div>
      <h3 class="text-base font-bold text-gray-800 dark:text-white">Download</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400">YouTube URL &amp; choose format</p>
    </div>
    <input type="text" id="downloadUrlInput" placeholder="https://youtube.com/..." class="rounded-lg mb-2 text-sm dark:text-white" onkeydown="if(event.key==='Enter') downloadVideo('mp3')">
    <div class="flex gap-2 mb-2">
      <button onclick="downloadVideo('mp3')" class="flex-1 download-option-btn px-2 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold text-sm active:scale-95">
        <i class="fas fa-music mr-1"></i> MP3
      </button>
      <button onclick="downloadVideo('mp4')" class="flex-1 download-option-btn px-2 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-semibold text-sm active:scale-95">
        <i class="fas fa-video mr-1"></i> MP4
      </button>
    </div>
    <button onclick="closeDownloadModal()" class="w-full px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
    <div id="downloadResult" class="mt-2 text-xs text-center text-gray-600 dark:text-gray-300 hidden"></div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const STORAGE_KEY = 'pro_h_link_app_readonly_v1';
const PERSONAL_ID = '7';
const HIDDEN_PASSWORD = 'admin123';

// ============================================================
//  DATA
// ============================================================
let links = [];
let pendingLink = null;
let hiddenLinksVisible = false;

// Hidden links data (only shown after password)
const hiddenLinks = [
  { id: 'h1', title: '🔥 telegram video', url: 'https://t.me/myanmarvideohd', description: 'Confidential internal project', category: 'Hidden', tags: ['secret', 'internal', 'project'], favorite: true, icon: 'fas fa-fire', linkPassword: '', createdAt: Date.now() - 1000 },
  { id: 'h2', title: '📁 internet Tools', url: '', description: 'Company internal tools dashboard', category: 'Hidden', tags: ['internal', 'tools', 'work'], favorite: true, icon: 'fas fa-folder-open', linkPassword: '', createdAt: Date.now() - 800 },
  { id: 'h3', title: '🚀 Premium Resources', url: 'https://premium-resources.example.com', description: 'Exclusive premium content', category: 'Hidden', tags: ['premium', 'exclusive', 'resources'], favorite: true, icon: 'fas fa-gem', linkPassword: '', createdAt: Date.now() - 500 }
];

// ============================================================
//  HIDDEN LINKS TOGGLE
// ============================================================
function toggleHiddenLinks() {
  if (hiddenLinksVisible) {
    // Hide hidden links
    hiddenLinksVisible = false;
    document.getElementById('hiddenToggleBtn').classList.remove('active');
    document.getElementById('hiddenBtnText').textContent = 'Hidden';
    document.getElementById('hiddenToggleBtn').innerHTML = '<i class="fas fa-eye"></i> <span id="hiddenBtnText">Hidden</span>';
    render();
    showToast('🔒 Hidden links hidden');
  } else {
    // Show password modal
    document.getElementById('hiddenPasswordModal').classList.remove('hidden');
    document.getElementById('hiddenPasswordInput').value = '';
    document.getElementById('hiddenPasswordError').classList.add('hidden');
    setTimeout(() => document.getElementById('hiddenPasswordInput').focus(), 80);
  }
}

function closeHiddenPasswordModal() {
  document.getElementById('hiddenPasswordModal').classList.add('hidden');
}

function verifyHiddenPassword() {
  const input = document.getElementById('hiddenPasswordInput').value;
  if (input === HIDDEN_PASSWORD) {
    hiddenLinksVisible = true;
    document.getElementById('hiddenToggleBtn').classList.add('active');
    document.getElementById('hiddenToggleBtn').innerHTML = '<i class="fas fa-eye-slash"></i> <span id="hiddenBtnText">Hide</span>';
    closeHiddenPasswordModal();
    render();
    showToast('🔓 Hidden links revealed!');
  } else {
    document.getElementById('hiddenPasswordError').classList.remove('hidden');
    document.getElementById('hiddenPasswordInput').value = '';
    document.getElementById('hiddenPasswordInput').focus();
  }
}

// ============================================================
//  RESET
// ============================================================
function resetToDefault() {
  if (confirm('Reset to default links?')) {
    localStorage.removeItem(STORAGE_KEY);
    links = getDefaultLinks();
    saveLinks();
    hiddenLinksVisible = false;
    document.getElementById('hiddenToggleBtn').classList.remove('active');
    document.getElementById('hiddenToggleBtn').innerHTML = '<i class="fas fa-eye"></i> <span id="hiddenBtnText">Hidden</span>';
    render();
    showToast('✅ Reset to default');
  }
}

function showLinkPasswordModal(link) {

  setTimeout(() => document.getElementById('linkPasswordInput').focus(), 80);
  document.getElementById('linkPasswordError').classList.add('hidden');
}
function closeLinkPasswordModal() {
  document.getElementById('linkPasswordModal').classList.add('hidden');

}
function verifyLinkPassword() {
  const input = document.getElementById('linkPasswordInput').value;
  if (pendingLink && input === pendingLink.linkPassword) {
    window.open(pendingLink.url, '_blank');
    closeLinkPasswordModal();
    pendingLink = null;
  } else {
    document.getElementById('linkPasswordError').classList.remove('hidden');
    document.getElementById('linkPasswordInput').value = '';
    document.getElementById('linkPasswordInput').focus();
  }
}

// ============================================================
//  DOWNLOAD MODAL
// ============================================================
function showDownloadModal() {
  document.getElementById('downloadModal').classList.remove('hidden');
  document.getElementById('downloadUrlInput').value = '';
  document.getElementById('downloadResult').classList.add('hidden');
  setTimeout(() => document.getElementById('downloadUrlInput').focus(), 80);
}
function closeDownloadModal() {
  document.getElementById('downloadModal').classList.add('hidden');
}
function downloadVideo(format) {
  const url = document.getElementById('downloadUrlInput').value.trim();
  const resultEl = document.getElementById('downloadResult');
  if (!url) {
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = '⚠️ Enter a YouTube URL';
    resultEl.className = 'mt-2 text-xs text-center text-red-500';
    return;
  }
  resultEl.classList.remove('hidden');
  resultEl.innerHTML = '⏳ Opening...';
  resultEl.className = 'mt-2 text-xs text-center text-blue-500';

  const encoded = encodeURIComponent(url);
  const dlUrl = format === 'mp3'
    ? `https://ytmp3.cc/en68/search?q=${encoded}`
    : `https://savefrom.net/?url=${encoded}`;
  window.open(dlUrl, '_blank');
  resultEl.innerHTML = format === 'mp3'
    ? '✅ Opening YTMP3.cc for MP3'
    : '✅ Opening SaveFrom.net for MP4';
  resultEl.className = 'mt-2 text-xs text-center text-green-500';
  setTimeout(closeDownloadModal, 1400);
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 glass rounded-lg px-4 py-2 z-50 dark:glass-dark text-gray-800 dark:text-white shadow-lg text-sm animate-[fadeIn_0.15s_ease]';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.15s'; setTimeout(() => el.remove(), 200); }, 1600);
}

// ============================================================
//  STORAGE
// ============================================================
function loadLinks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) links = parsed;
      else { links = getDefaultLinks(); saveLinks(); }
    } else {
      links = getDefaultLinks();
      saveLinks();
    }
  } catch (e) {
    links = getDefaultLinks();
    saveLinks();
  }
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('linkGrid').classList.remove('hidden');
  render();
}
function saveLinks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); } catch (e) {}
}

// ============================================================
//  HELPERS
// ============================================================
function getCategoryCount() {
  const allLinks = hiddenLinksVisible ? [...links, ...hiddenLinks] : links;
  return new Set(allLinks.map(l => l.category || 'Uncategorized')).size;
}
function getFavCount() {
  const allLinks = hiddenLinksVisible ? [...links, ...hiddenLinks] : links;
  return allLinks.filter(l => l.favorite).length;
}
function getNewestTitle() {
  const allLinks = hiddenLinksVisible ? [...links, ...hiddenLinks] : links;
  if (!allLinks.length) return '—';
  return [...allLinks].sort((a,b) => b.createdAt - a.createdAt)[0]?.title || '—';
}
function getPlatformIcon(url, iconOverride) {
  if (iconOverride && iconOverride.trim()) return iconOverride.trim();
  if (!url) return 'fas fa-globe';
  const u = url.toLowerCase();
  if (u.includes('w3schools')) return 'fas fa-code';
  if (u.includes('youtube')) return 'fab fa-youtube';
  if (u.includes('gemini')) return 'fas fa-star';
  if (u.includes('tiktok')) return 'fab fa-tiktok';
  if (u.includes('chatgpt')) return 'fas fa-robot';
  if (u.includes('ilovepdf')) return 'fas fa-file-pdf';
  if (u.includes('livesports808')) return 'fas fa-futbol';
  if (u.includes('lovable')) return 'fas fa-heart';
  if (u.includes('example.com')) return 'fas fa-globe';
  return 'fas fa-link';
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const categoryFilter = document.getElementById('categoryFilter').value;
  const sortVal = document.getElementById('sortFilter').value;

  // Get all links (including hidden if visible)
  let allLinks = [...links];
  if (hiddenLinksVisible) {
    allLinks = [...allLinks, ...hiddenLinks];
  }

  // Update category dropdown
  const catSet = new Set();
  allLinks.forEach(l => { if (l.category) catSet.add(l.category); });
  const catSelect = document.getElementById('categoryFilter');
  const currentCat = catSelect.value;
  catSelect.innerHTML = '<option value="all">All cats</option>';
  [...catSet].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    catSelect.appendChild(opt);
  });
  if ([...catSet].includes(currentCat)) catSelect.value = currentCat;
  else catSelect.value = 'all';

  // Filter
  let filtered = allLinks.filter(link => {
    const matchSearch = link.title.toLowerCase().includes(search) ||
                       (link.tags && link.tags.some(t => t.toLowerCase().includes(search))) ||
                       (link.description && link.description.toLowerCase().includes(search));
    const matchCategory = categoryFilter === 'all' || link.category === categoryFilter;
    return matchSearch && matchCategory;
  });

  // Sort (priority order: Personal → New Website → W3Schools → TikTok → Chinese For All → rest)
  const order = ['7', '13', '12', '9', '11'];
  const sortFn = (a, b) => {
    const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    if (sortVal === 'newest') return b.createdAt - a.createdAt;
    if (sortVal === 'oldest') return a.createdAt - b.createdAt;
    if (sortVal === 'alpha') return a.title.localeCompare(b.title);
    return b.createdAt - a.createdAt;
  };
  filtered.sort(sortFn);

  // Stats
  document.getElementById('totalCount').textContent = allLinks.length;
  document.getElementById('categoryCount').textContent = getCategoryCount();
  document.getElementById('favCount').textContent = getFavCount();
  document.getElementById('newestLabel').textContent = getNewestTitle();

  const grid = document.getElementById('linkGrid');
  const empty = document.getElementById('emptyState');

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  // Build cards
  grid.innerHTML = filtered.map((link, i) => {
    const icon = getPlatformIcon(link.url, link.icon);
    const favStar = link.favorite ? 'text-yellow-400' : 'text-gray-300 dark:text-gray-600';
    const tagsHtml = (link.tags?.length) ? link.tags.map(t => `<span class="tag">#${t}</span>`).join(' ') : '';
    const dateStr = new Date(link.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const isProtected = !!(link.linkPassword && link.linkPassword.trim());
    const lockBadge = isProtected ? `<span class="lock-badge"><i class="fas fa-lock"></i> Protected</span>` : '';
    const isPersonal = link.id === PERSONAL_ID || link.id === '13';
    const personalBadge = isPersonal ? `<span class="personal-badge"><i class="fas fa-star"></i> Personal</span>` : '';
    const isHidden = link.id && link.id.startsWith('h');
    const hiddenBadge = isHidden && hiddenLinksVisible ? `<span class="hidden-badge"><i class="fas fa-eye"></i> Hidden</span>` : '';
    const isVideo = link.url && (link.url.includes('youtube') || link.url.includes('tiktok') || link.url.includes('video'));
    const downloadBtn = isVideo ? `
      <button onclick="event.stopPropagation(); showDownloadModal()" class="download-badge" title="Download Video">
        <i class="fas fa-download"></i> Download
      </button>
    ` : '';

    return `
      <div class="glass rounded-xl p-2.5 card dark:glass-dark flex flex-col ${isPersonal ? 'border-2 border-yellow-400/40 dark:border-yellow-400/20' : ''} ${isHidden ? 'border-2 border-purple-500/40 dark:border-purple-500/20' : ''} card-enter" style="animation-delay:${Math.min(i*0.02,0.2)}s" onclick="handleLinkClick('${link.id}')">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-1.5 min-w-0">
            <div class="icon-bg"><i class="${icon}"></i></div>
            <div class="min-w-0">
              <h4 class="font-semibold text-gray-800 dark:text-white text-sm truncate">${link.title}</h4>
              <span class="text-[0.5rem] text-gray-400 dark:text-gray-500">${link.category || 'Uncategorized'}</span>
            </div>
          </div>
          <div class="flex items-center gap-0.5 flex-shrink-0">
            ${hiddenBadge}
            ${personalBadge}
            ${lockBadge}
            <i class="fas fa-star ${favStar} text-[0.5rem]"></i>
          </div>
        </div>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">${link.description || 'No description'}</p>
        <div class="flex flex-wrap gap-0.5 mt-1">${tagsHtml}</div>
        <div class="flex items-center justify-between mt-1.5 text-[0.5rem] text-gray-400 dark:text-gray-500">
          <span><i class="far fa-calendar-alt mr-0.5"></i>${dateStr}</span>
          <div class="flex gap-1 items-center">
            ${downloadBtn}
            <button onclick="event.stopPropagation(); copyLink('${link.url}')" class="hover:text-blue-500 dark:hover:text-blue-400 p-0.5 transition-colors" title="Copy"><i class="fas fa-copy"></i></button>
            <button onclick="event.stopPropagation(); handleLinkClick('${link.id}')" class="hover:text-blue-500 dark:hover:text-blue-400 p-0.5 transition-colors" title="${isProtected ? '🔒 Unlock' : 'Open'}">
              <i class="${isProtected ? 'fas fa-lock' : 'fas fa-external-link-alt'}"></i>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
//  HANDLERS
// ============================================================
function handleLinkClick(id) {
  const allLinks = hiddenLinksVisible ? [...links, ...hiddenLinks] : links;
  const link = allLinks.find(l => l.id === id);
  if (!link) return;
  if (link.linkPassword && link.linkPassword.trim()) {
    showLinkPasswordModal(link);
  } else {
    window.open(link.url, '_blank');
  }
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('✅ Copied!')).catch(() => prompt('Copy URL:', url));
}
function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('categoryFilter').value = 'all';
  document.getElementById('sortFilter').value = 'newest';
  render();
}

// ============================================================
//  THEME
// ============================================================
function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? 'true' : 'false');
}
if (localStorage.getItem('darkMode') === 'true') {
  document.documentElement.classList.add('dark');
  document.body.classList.add('dark');
}

// ============================================================
//  EVENTS
// ============================================================
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('categoryFilter').addEventListener('change', render);
document.getElementById('sortFilter').addEventListener('change', render);
document.getElementById('linkPasswordModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeLinkPasswordModal(); });
document.getElementById('hiddenPasswordModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeHiddenPasswordModal(); });
document.getElementById('downloadModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDownloadModal(); });
document.getElementById('linkPasswordInput').addEventListener('keydown', e => { if (e.key === 'Enter') verifyLinkPassword(); });
document.getElementById('hiddenPasswordInput').addEventListener('keydown', e => { if (e.key === 'Enter') verifyHiddenPassword(); });

// ============================================================
//  START
// ============================================================
loadLinks();
console.log('✅ Pro H · Optimized for UI/UX & Performance');
</script>
