<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTET LINK APP · modern dashboard</title>
  <!-- Tailwind via CDN + base styles -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Framer Motion via ESM (simple) – we use a lightweight approach with CSS transitions + a tiny motion library -->
  <style>
    /* glassmorphism + premium feel + dark/light mode */
    * { transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 12px 40px rgba(0, 20, 60, 0.08);
    }
    .glass-dark {
      background: rgba(20, 30, 60, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      color: #f0f4ff;
    }
    .card-hover {
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 40, 120, 0.25);
      border-color: rgba(79, 131, 255, 0.3);
    }
    .btn-gradient {
      background: linear-gradient(145deg, #4f7cff, #3b5fd9);
      border: none;
      color: white;
      transition: all 0.15s ease;
    }
    .btn-gradient:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(59, 95, 217, 0.35);
    }
    .btn-outline-light {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.4);
      color: #1a2639;
    }
    .dark .btn-outline-light {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: #eef2ff;
    }
    .dark body { background: #0b1120; }
    .dark .glass { background: rgba(25, 35, 70, 0.6); border-color: rgba(255,255,255,0.06); }
    .dark .glass-dark { background: rgba(12, 18, 40, 0.8); border-color: rgba(255,255,255,0.04); }
    .tag-pill {
      background: rgba(79, 124, 255, 0.12);
      color: #1f3a8a;
      font-size: 0.7rem;
      padding: 0.2rem 0.65rem;
      border-radius: 30px;
      display: inline-block;
      backdrop-filter: blur(2px);
    }
    .dark .tag-pill {
      background: rgba(79, 124, 255, 0.2);
      color: #b8caff;
    }
    .icon-bg {
      background: rgba(79, 124, 255, 0.08);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 1.3rem;
      color: #2b4eb0;
    }
    .dark .icon-bg { background: rgba(79, 124, 255, 0.15); color: #8aadff; }
    .modal-overlay {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
    }
    .dark .modal-overlay { background: rgba(0, 0, 0, 0.6); }
    input, select, textarea {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 0.6rem 1rem;
      width: 100%;
      transition: 0.15s;
    }
    .dark input, .dark select, .dark textarea {
      background: rgba(20, 30, 65, 0.5);
      border-color: rgba(255,255,255,0.06);
      color: #eef2ff;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid #4f7cff;
      border-color: transparent;
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.15);
    }
    .scrollbar-hide::-webkit-scrollbar { width: 4px; }
    .scrollbar-hide::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-hide::-webkit-scrollbar-thumb { background: #b0c8ff; border-radius: 12px; }
  </style>
</head>
<body class="antialiased p-4 md:p-6 transition-colors" id="app">
  <div id="root" class="max-w-7xl mx-auto">
    <!-- header + dark toggle -->
    <div class="flex flex-wrap items-center justify-between mb-6 gap-3">
      <div class="flex items-center gap-3">
        <div class="text-3xl bg-gradient-to-br from-[#4f7cff] to-[#7a5cff] bg-clip-text text-transparent font-bold tracking-tight">
          <i class="fas fa-link text-blue-500 mr-2"></i>My Link Hub
        </div>
        <span class="text-sm text-gray-500 dark:text-gray-400 bg-white/30 dark:bg-white/5 px-3 py-1 rounded-full backdrop-blur-sm border border-white/20">v1.0</span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDark()" class="glass px-4 py-2 rounded-2xl text-sm flex items-center gap-2 hover:scale-105 transition">
          <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i> <span class="hidden sm:inline">Theme</span>
        </button>
        <button onclick="openModal()" class="btn-gradient px-5 py-2.5 rounded-2xl text-sm font-medium flex items-center gap-2 shadow-lg shadow-blue-500/20">
          <i class="fas fa-plus"></i> <span class="hidden sm:inline">Add Link</span>
        </button>
      </div>
    </div>

    <!-- stats dashboard -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-link text-blue-400"></i> Total</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="totalCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-tags text-indigo-400"></i> Categories</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="categoryCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-star text-yellow-400"></i> Favorites</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="favCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-clock text-purple-400"></i> Newest</div>
        <div class="text-sm font-medium text-gray-700 dark:text-gray-200 truncate" id="newestLabel">—</div>
      </div>
    </div>

    <!-- search + filter -->
    <div class="glass rounded-3xl p-4 md:p-5 mb-8 flex flex-wrap items-center gap-3 dark:glass-dark">
      <div class="flex-1 min-w-[180px] relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" id="searchInput" placeholder="Search by title, tags..." class="pl-10 pr-4 py-2.5 rounded-2xl w-full border-0 bg-white/40 dark:bg-black/20">
      </div>
      <select id="categoryFilter" class="w-auto min-w-[130px] py-2.5 rounded-2xl border-0 bg-white/40 dark:bg-black/20">
        <option value="all">All categories</option>
      </select>
      <select id="sortFilter" class="w-auto min-w-[120px] py-2.5 rounded-2xl border-0 bg-white/40 dark:bg-black/20">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="alpha">A–Z</option>
      </select>
      <button onclick="clearFilters()" class="text-sm text-gray-500 hover:text-blue-500 px-3 py-1"><i class="fas fa-times"></i> Reset</button>
    </div>

    <!-- link cards grid -->
    <div id="linkGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      <!-- dynamic cards injected -->
    </div>
    <div id="emptyState" class="glass rounded-3xl p-12 text-center mt-6 hidden dark:glass-dark">
      <i class="fas fa-link text-4xl text-blue-300/50 mb-3"></i>
      <p class="text-gray-500 dark:text-gray-300">No links yet. Start by adding your first link!</p>
    </div>
  </div>

  <!-- Modal (Add/Edit) -->
  <div id="modalOverlay" class="fixed inset-0 flex items-center justify-center p-4 modal-overlay z-50 hidden transition-opacity">
    <div class="glass rounded-3xl max-w-xl w-full p-6 md:p-8 max-h-[90vh] overflow-y-auto scrollbar-hide dark:glass-dark">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-2xl font-bold text-gray-800 dark:text-white" id="modalTitle"><i class="fas fa-plus-circle text-blue-500 mr-2"></i>Add Link</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <form id="linkForm" onsubmit="saveLink(event)">
        <input type="hidden" id="editId" value="">
        <div class="space-y-4">
          <div><input type="text" id="formTitle" placeholder="Title *" required class="rounded-2xl"></div>
          <div><input type="text" id="formUrl" placeholder="URL * (https://...)" required class="rounded-2xl"></div>
          <div><textarea id="formDesc" rows="2" placeholder="Description (optional)" class="rounded-2xl"></textarea></div>
          <div class="flex flex-wrap gap-3">
            <div class="flex-1 min-w-[130px]"><input type="text" id="formCategory" placeholder="Category (e.g. Work)" class="rounded-2xl"></div>
            <div class="flex-1 min-w-[130px]"><input type="text" id="formTags" placeholder="Tags (comma separated)" class="rounded-2xl"></div>
          </div>
          <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="formFav"> <i class="fas fa-star text-yellow-400"></i> Favorite</label>
            <label class="flex items-center gap-2 text-sm"><i class="fas fa-image text-gray-400"></i> <input type="text" id="formIcon" placeholder="Icon (emoji or fa class)" class="w-32 rounded-2xl"></label>
          </div>
          <div class="flex justify-end gap-3 pt-2">
            <button type="button" onclick="closeModal()" class="px-5 py-2 rounded-2xl border border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300">Cancel</button>
            <button type="submit" class="btn-gradient px-6 py-2 rounded-2xl"><i class="fas fa-save mr-1"></i> Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ---- DATA LAYER (localStorage) ----
    let links = [];
    let editingId = null;
    const STORAGE_KEY = 'linkhub_links';

    // load from storage
    function loadLinks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) links = JSON.parse(raw);
        else links = getDefaultLinks();
      } catch { links = getDefaultLinks(); }
      render();
    }

    function saveLinks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function getDefaultLinks() {
      return [
        { id: '1', title: 'YouTube', url: 'https://youtube.com', description: 'Video platform', category: 'Videos', tags: ['video', 'media'], favorite: true, icon: 'fab fa-youtube', createdAt: Date.now() - 200000 },
        { id: '2', title: 'GitHub', url: 'https://github.com', description: 'Code hosting', category: 'Work', tags: ['dev', 'code'], favorite: false, icon: 'fab fa-github', createdAt: Date.now() - 50000 },
        { id: '3', title: 'Google Drive', url: 'https://drive.google.com', description: 'Cloud storage', category: 'Documents', tags: ['drive', 'cloud'], favorite: false, icon: 'fab fa-google-drive', createdAt: Date.now() - 10000 },
        { id: '4', title: 'LinkedIn', url: 'https://linkedin.com', description: 'Professional network', category: 'Social Media', tags: ['social', 'career'], favorite: true, icon: 'fab fa-linkedin', createdAt: Date.now() - 8000 },
      ];
    }

    // ---- HELPERS ----
    function getCategoryCount() {
      const cats = new Set(links.map(l => l.category || 'Uncategorized'));
      return cats.size;
    }

    function getFavCount() {
      return links.filter(l => l.favorite).length;
    }

    function getNewestTitle() {
      if (!links.length) return '—';
      const sorted = [...links].sort((a,b) => b.createdAt - a.createdAt);
      return sorted[0]?.title || '—';
    }

    function getPlatformIcon(url, iconOverride) {
      if (iconOverride && iconOverride.trim()) return iconOverride.trim();
      if (!url) return 'fas fa-globe';
      const u = url.toLowerCase();
      if (u.includes('youtube')) return 'fab fa-youtube';
      if (u.includes('drive.google')) return 'fab fa-google-drive';
      if (u.includes('docs.google')) return 'fas fa-file-alt';
      if (u.includes('sheets.google')) return 'fas fa-table';
      if (u.includes('tiktok')) return 'fab fa-tiktok';
      if (u.includes('facebook')) return 'fab fa-facebook';
      if (u.includes('instagram')) return 'fab fa-instagram';
      if (u.includes('telegram')) return 'fab fa-telegram';
      if (u.includes('whatsapp')) return 'fab fa-whatsapp';
      if (u.includes('github')) return 'fab fa-github';
      if (u.includes('linkedin')) return 'fab fa-linkedin';
      return 'fas fa-link';
    }

    // ---- RENDER ----
    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const categoryFilter = document.getElementById('categoryFilter').value;
      const sortVal = document.getElementById('sortFilter').value;

      // populate category filter
      const catSet = new Set();
      links.forEach(l => { if (l.category) catSet.add(l.category); });
      const catSelect = document.getElementById('categoryFilter');
      const currentCat = catSelect.value;
      catSelect.innerHTML = '<option value="all">All categories</option>';
      [...catSet].sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        catSelect.appendChild(opt);
      });
      if ([...catSet].includes(currentCat)) catSelect.value = currentCat;
      else catSelect.value = 'all';

      // filter
      let filtered = links.filter(link => {
        const matchSearch = link.title.toLowerCase().includes(search) || 
                           (link.tags && link.tags.some(t => t.toLowerCase().includes(search))) ||
                           (link.description && link.description.toLowerCase().includes(search));
        const matchCategory = categoryFilter === 'all' || link.category === categoryFilter;
        return matchSearch && matchCategory;
      });

      // sort
      if (sortVal === 'newest') filtered.sort((a,b) => b.createdAt - a.createdAt);
      else if (sortVal === 'oldest') filtered.sort((a,b) => a.createdAt - b.createdAt);
      else if (sortVal === 'alpha') filtered.sort((a,b) => a.title.localeCompare(b.title));

      // stats
      document.getElementById('totalCount').textContent = links.length;
      document.getElementById('categoryCount').textContent = getCategoryCount();
      document.getElementById('favCount').textContent = getFavCount();
      document.getElementById('newestLabel').textContent = getNewestTitle();

      const grid = document.getElementById('linkGrid');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map(link => {
        const icon = getPlatformIcon(link.url, link.icon);
        const favStar = link.favorite ? 'text-yellow-400' : 'text-gray-300 dark:text-gray-600';
        const tagsHtml = (link.tags && link.tags.length) ? link.tags.map(t => `<span class="tag-pill">#${t}</span>`).join(' ') : '';
        const dateStr = new Date(link.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <div class="glass rounded-3xl p-5 card-hover dark:glass-dark flex flex-col">
            <div class="flex items-start justify-between">
              <div class="flex items-center gap-3">
                <div class="icon-bg"><i class="${icon}"></i></div>
                <div>
                  <h4 class="font-semibold text-gray-800 dark:text-white">${link.title}</h4>
                  <span class="text-xs text-gray-400 dark:text-gray-400">${link.category || 'Uncategorized'}</span>
                </div>
              </div>
              <i class="fas fa-star ${favStar} text-sm"></i>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-300 mt-2 line-clamp-2">${link.description || 'No description'}</p>
            <div class="flex flex-wrap gap-1 mt-2">${tagsHtml}</div>
            <div class="flex items-center justify-between mt-4 text-xs text-gray-400 dark:text-gray-500">
              <span><i class="far fa-calendar-alt mr-1"></i>${dateStr}</span>
              <div class="flex gap-2">
                <button onclick="copyLink('${link.url}')" class="hover:text-blue-500 p-1"><i class="fas fa-copy"></i></button>
                <a href="${link.url}" target="_blank" class="hover:text-blue-500 p-1"><i class="fas fa-external-link-alt"></i></a>
                <button onclick="editLink('${link.id}')" class="hover:text-indigo-400 p-1"><i class="fas fa-edit"></i></button>
                <button onclick="deleteLink('${link.id}')" class="hover:text-red-400 p-1"><i class="fas fa-trash-alt"></i></button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ---- CRUD ----
    function saveLink(e) {
      e.preventDefault();
      const title = document.getElementById('formTitle').value.trim();
      const url = document.getElementById('formUrl').value.trim();
      const desc = document.getElementById('formDesc').value.trim();
      const category = document.getElementById('formCategory').value.trim() || 'Uncategorized';
      const tagsRaw = document.getElementById('formTags').value.trim();
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const favorite = document.getElementById('formFav').checked;
      const icon = document.getElementById('formIcon').value.trim();
      const editId = document.getElementById('editId').value;

      if (!title || !url) return alert('Title and URL are required.');

      if (editId) {
        const idx = links.findIndex(l => l.id === editId);
        if (idx !== -1) {
          links[idx] = { ...links[idx], title, url, description: desc, category, tags, favorite, icon };
        }
      } else {
        const newLink = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
          title, url, description: desc, category, tags, favorite, icon,
          createdAt: Date.now()
        };
        links.push(newLink);
      }
      saveLinks();
      closeModal();
      render();
    }

    function deleteLink(id) {
      if (!confirm('Delete this link?')) return;
      links = links.filter(l => l.id !== id);
      saveLinks();
      render();
    }

    function editLink(id) {
      const link = links.find(l => l.id === id);
      if (!link) return;
      editingId = id;
      document.getElementById('editId').value = id;
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit text-blue-500 mr-2"></i>Edit Link';
      document.getElementById('formTitle').value = link.title;
      document.getElementById('formUrl').value = link.url;
      document.getElementById('formDesc').value = link.description || '';
      document.getElementById('formCategory').value = link.category || '';
      document.getElementById('formTags').value = (link.tags || []).join(', ');
      document.getElementById('formFav').checked = link.favorite || false;
      document.getElementById('formIcon').value = link.icon || '';
      openModal();
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        alert('Link copied to clipboard!');
      }).catch(() => {
        prompt('Copy this URL:', url);
      });
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = 'all';
      document.getElementById('sortFilter').value = 'newest';
      render();
    }

    // ---- MODAL ----
    function openModal() {
      document.getElementById('modalOverlay').classList.remove('hidden');
      if (!document.getElementById('editId').value) {
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle text-blue-500 mr-2"></i>Add Link';
        document.getElementById('linkForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('formFav').checked = false;
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      document.getElementById('editId').value = '';
    }

    // ---- THEME ----
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark') ? 'true' : 'false');
    }

    // init theme
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
      document.body.classList.add('dark');
    }

    // ---- SEARCH & FILTER listeners ----
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('categoryFilter').addEventListener('change', render);
    document.getElementById('sortFilter').addEventListener('change', render);

    // close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // start
    loadLinks();
  </script>
</body>
</html>
