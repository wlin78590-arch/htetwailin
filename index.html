<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTET LINK APP · Read Only</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 12px 40px rgba(0, 20, 60, 0.08);
    }
    .glass-dark {
      background: rgba(20, 30, 60, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      color: #f0f4ff;
    }
    .card-hover {
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      cursor: pointer;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 40, 120, 0.25);
      border-color: rgba(79, 131, 255, 0.3);
    }
    .dark body { background: #0b1120; }
    .dark .glass { background: rgba(25, 35, 70, 0.6); border-color: rgba(255,255,255,0.06); }
    .dark .glass-dark { background: rgba(12, 18, 40, 0.8); border-color: rgba(255,255,255,0.04); }
    .tag-pill {
      background: rgba(79, 124, 255, 0.12);
      color: #1f3a8a;
      font-size: 0.7rem;
      padding: 0.2rem 0.65rem;
      border-radius: 30px;
      display: inline-block;
      backdrop-filter: blur(2px);
    }
    .dark .tag-pill {
      background: rgba(79, 124, 255, 0.2);
      color: #b8caff;
    }
    .icon-bg {
      background: rgba(79, 124, 255, 0.08);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 1.3rem;
      color: #2b4eb0;
    }
    .dark .icon-bg { background: rgba(79, 124, 255, 0.15); color: #8aadff; }
    input, select {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 0.6rem 1rem;
      width: 100%;
      transition: 0.15s;
    }
    .dark input, .dark select {
      background: rgba(20, 30, 65, 0.5);
      border-color: rgba(255,255,255,0.06);
      color: #eef2ff;
    }
    input:focus, select:focus {
      outline: 2px solid #4f7cff;
      border-color: transparent;
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.15);
    }
    .scrollbar-hide::-webkit-scrollbar { width: 4px; }
    .scrollbar-hide::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-hide::-webkit-scrollbar-thumb { background: #b0c8ff; border-radius: 12px; }
    
    .lock-badge {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .dark .lock-badge {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    
    .password-modal {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    
    #loadingState {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    .spinner {
      border: 4px solid rgba(79, 124, 255, 0.1);
      border-top: 4px solid #4f7cff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .readonly-badge {
      background: rgba(79, 124, 255, 0.08);
      color: #4f7cff;
      font-size: 0.6rem;
      padding: 0.15rem 0.6rem;
      border-radius: 30px;
      border: 1px solid rgba(79, 124, 255, 0.15);
    }
    .dark .readonly-badge {
      background: rgba(79, 124, 255, 0.12);
      color: #8aadff;
      border-color: rgba(79, 124, 255, 0.2);
    }
  </style>
</head>
<body class="antialiased p-4 md:p-6 transition-colors" id="app">
  <div id="root" class="max-w-7xl mx-auto">
    <!-- header -->
    <div class="flex flex-wrap items-center justify-between mb-6 gap-3">
      <div class="flex items-center gap-3">
        <div class="text-3xl bg-gradient-to-br from-[#4f7cff] to-[#7a5cff] bg-clip-text text-transparent font-bold tracking-tight">
          <i class="fas fa-link text-blue-500 mr-2"></i>HTET LINK APP
        </div>
        <span class="text-sm text-gray-500 dark:text-gray-400 bg-white/30 dark:bg-white/5 px-3 py-1 rounded-full backdrop-blur-sm border border-white/20">📖 Read Only</span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDark()" class="glass px-4 py-2 rounded-2xl text-sm flex items-center gap-2 hover:scale-105 transition">
          <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i> <span class="hidden sm:inline">Theme</span>
        </button>
        <span class="readonly-badge"><i class="fas fa-lock mr-1"></i> Read Only</span>
        <button onclick="resetToDefault()" class="glass px-4 py-2 rounded-2xl text-sm flex items-center gap-2 hover:scale-105 transition text-red-500">
          <i class="fas fa-redo"></i> <span class="hidden sm:inline">Reset</span>
        </button>
      </div>
    </div>

    <!-- stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-link text-blue-400"></i> Total</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="totalCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-tags text-indigo-400"></i> Categories</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="categoryCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-star text-yellow-400"></i> Favorites</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="favCount">0</div>
      </div>
      <div class="glass rounded-3xl p-5 card-hover dark:glass-dark">
        <div class="text-sm text-gray-500 dark:text-gray-300 flex items-center gap-2"><i class="fas fa-clock text-purple-400"></i> Newest</div>
        <div class="text-sm font-medium text-gray-700 dark:text-gray-200 truncate" id="newestLabel">—</div>
      </div>
    </div>

    <!-- search + filter -->
    <div class="glass rounded-3xl p-4 md:p-5 mb-8 flex flex-wrap items-center gap-3 dark:glass-dark">
      <div class="flex-1 min-w-[180px] relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" id="searchInput" placeholder="Search by title, tags..." class="pl-10 pr-4 py-2.5 rounded-2xl w-full border-0 bg-white/40 dark:bg-black/20">
      </div>
      <select id="categoryFilter" class="w-auto min-w-[130px] py-2.5 rounded-2xl border-0 bg-white/40 dark:bg-black/20">
        <option value="all">All categories</option>
      </select>
      <select id="sortFilter" class="w-auto min-w-[120px] py-2.5 rounded-2xl border-0 bg-white/40 dark:bg-black/20">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="alpha">A–Z</option>
      </select>
      <button onclick="clearFilters()" class="text-sm text-gray-500 hover:text-blue-500 px-3 py-1"><i class="fas fa-times"></i> Reset</button>
    </div>

    <!-- link cards grid -->
    <div id="loadingState">
      <div class="spinner"></div>
    </div>
    <div id="linkGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden">
      <!-- dynamic cards -->
    </div>
    <div id="emptyState" class="glass rounded-3xl p-12 text-center mt-6 hidden dark:glass-dark">
      <i class="fas fa-link text-4xl text-blue-300/50 mb-3"></i>
      <p class="text-gray-500 dark:text-gray-300">No links available.</p>
    </div>

    <!-- Footer -->
    <div class="text-center text-xs text-gray-400 dark:text-gray-600 mt-8 pb-4">
      <i class="fas fa-shield-alt text-blue-400 mr-1"></i>
      This is a read-only link hub.
      <span class="block sm:inline">🔒 No one can add, edit, or delete links.</span>
    </div>
  </div>

  <!-- Password Modal for Protected Link -->
  <div id="linkPasswordModal" class="fixed inset-0 flex items-center justify-center p-4 password-modal hidden">
    <div class="glass rounded-3xl max-w-md w-full p-6 md:p-8 dark:glass-dark">
      <div class="text-center mb-5">
        <i class="fas fa-lock text-4xl text-red-400 mb-3"></i>
        <h3 class="text-xl font-bold text-gray-800 dark:text-white">🔒 Protected Link</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter password to access this link</p>
      </div>
      <input type="password" id="linkPasswordInput" placeholder="Enter link password..." class="rounded-2xl mb-4" onkeydown="if(event.key==='Enter') verifyLinkPassword()">
      <div class="flex gap-3">
        <button onclick="closeLinkPasswordModal()" class="flex-1 px-4 py-2 rounded-2xl border border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300">Cancel</button>
        <button onclick="verifyLinkPassword()" class="flex-1 btn-gradient px-4 py-2 rounded-2xl">Unlock <i class="fas fa-unlock ml-1"></i></button>
      </div>
      <div id="linkPasswordError" class="text-red-500 text-sm text-center mt-3 hidden">❌ Wrong password! Try again.</div>
    </div>
  </div>

  <script>
    // ---- CONFIG ----
    const STORAGE_KEY = 'htet_link_app_readonly_v8';

    // ---- DATA ----
    let links = [];
    let pendingLink = null;

    // ---- RESET FUNCTION ----
    function resetToDefault() {
      if (confirm('⚠️ This will reset to default links. Continue?')) {
        localStorage.removeItem(STORAGE_KEY);
        links = getDefaultLinks();
        saveLinks();
        render();
        showToast('✅ Reset to default links!');
      }
    }

    // ---- LINK PASSWORD FUNCTIONS ----
    function showLinkPasswordModal(link) {
      pendingLink = link;
      document.getElementById('linkPasswordModal').classList.remove('hidden');
      document.getElementById('linkPasswordInput').value = '';
      document.getElementById('linkPasswordInput').focus();
      document.getElementById('linkPasswordError').classList.add('hidden');
    }

    function closeLinkPasswordModal() {
      document.getElementById('linkPasswordModal').classList.add('hidden');
      pendingLink = null;
    }

    function verifyLinkPassword() {
      const input = document.getElementById('linkPasswordInput').value;
      if (pendingLink && input === pendingLink.linkPassword) {
        window.open(pendingLink.url, '_blank');
        closeLinkPasswordModal();
        pendingLink = null;
      } else {
        document.getElementById('linkPasswordError').classList.remove('hidden');
        document.getElementById('linkPasswordInput').value = '';
        document.getElementById('linkPasswordInput').focus();
      }
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 left-1/2 transform -translate-x-1/2 glass rounded-2xl px-6 py-3 z-50 dark:glass-dark text-gray-800 dark:text-white shadow-xl';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // ---- DATA LAYER ----
    function loadLinks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) {
            links = parsed;
          } else {
            links = getDefaultLinks();
            saveLinks();
          }
        } else {
          links = getDefaultLinks();
          saveLinks();
        }
      } catch (e) {
        console.error('Error loading links:', e);
        links = getDefaultLinks();
        saveLinks();
      }
      
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('linkGrid').classList.remove('hidden');
      render();
    }

    function saveLinks() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
        console.log('✅ Saved', links.length, 'links');
      } catch (e) {
        console.error('Error saving links:', e);
      }
    }

    function getDefaultLinks() {
      return [
        { 
          id: '1', 
          title: '🎬 YouTube', 
          url: 'https://youtube.com', 
          description: 'Video platform for entertainment and learning', 
          category: 'Videos', 
          tags: ['video', 'media', 'entertainment'], 
          favorite: true, 
          icon: 'fab fa-youtube', 
          linkPassword: '', 
          createdAt: Date.now() - 200000 
        },
        { 
          id: '2', 
          title: '🐙 free', 
          url: 'https://www.pornhub.com', 
          description: 'Code hosting and collaboration platform', 
          category: 'Work', 
          tags: ['dev', 'code', 'programming'], 
          favorite: false, 
          icon: 'fab fa-github', 
          linkPassword: '', 
          createdAt: Date.now() - 50000 
        },
        { 
          id: '3', 
          title: '☁️ Google Drive', 
          url: 'https://drive.google.com', 
          description: 'Cloud storage for files and documents', 
          category: 'Documents', 
          tags: ['drive', 'cloud', 'storage'], 
          favorite: false, 
          icon: 'fab fa-google-drive', 
          linkPassword: '', 
          createdAt: Date.now() - 10000 
        },
        { 
          id: '4', 
          title: '💼 LinkedIn', 
          url: 'https://linkedin.com', 
          description: 'Professional networking platform', 
          category: 'Social Media', 
          tags: ['social', 'career', 'professional'], 
          favorite: true, 
          icon: 'fab fa-linkedin', 
          linkPassword: '', 
          createdAt: Date.now() - 8000 
        },
        { 
          id: '5', 
          title: '🌐 My Personal Website', 
          url: 'https://htetwailin.lovable.app', 
          description: 'My personal portfolio and workspace', 
          category: 'Personal', 
          tags: ['portfolio', 'personal', 'workspace'], 
          favorite: true, 
          icon: 'fas fa-heart', 
          linkPassword: '', 
          createdAt: Date.now() - 3000 
        },
        { 
          id: '6', 
          title: '📝 Google Docs', 
          url: 'https://docs.google.com', 
          description: 'Online document editor and collaboration', 
          category: 'Documents', 
          tags: ['docs', 'writing', 'collaboration'], 
          favorite: false, 
          icon: 'fas fa-file-alt', 
          linkPassword: '', 
          createdAt: Date.now() - 1000 
        },
        { 
          id: '7', 
          title: '🎵 TikTok', 
          url: 'https://www.tiktok.com', 
          description: 'Short-form video platform for creative content', 
          category: 'Social Media', 
          tags: ['video', 'social', 'short-form', 'creative'], 
          favorite: true, 
          icon: 'fab fa-tiktok', 
          linkPassword: '', 
          createdAt: Date.now() - 500 
        },
        { 
          id: '8', 
          title: '🎮 Online Games', 
          url: 'https://poki.com', 
          description: 'Free online games platform - play instantly', 
          category: 'Games', 
          tags: ['games', 'online', 'fun', 'entertainment'], 
          favorite: false, 
          icon: 'fas fa-gamepad', 
          linkPassword: '', 
          createdAt: Date.now() - 200 
        }
      ];
    }

    // ---- HELPERS ----
    function getCategoryCount() {
      const cats = new Set(links.map(l => l.category || 'Uncategorized'));
      return cats.size;
    }

    function getFavCount() {
      return links.filter(l => l.favorite).length;
    }

    function getNewestTitle() {
      if (!links.length) return '—';
      const sorted = [...links].sort((a,b) => b.createdAt - a.createdAt);
      return sorted[0]?.title || '—';
    }

    function getPlatformIcon(url, iconOverride) {
      if (iconOverride && iconOverride.trim()) return iconOverride.trim();
      if (!url) return 'fas fa-globe';
      const u = url.toLowerCase();
      if (u.includes('youtube')) return 'fab fa-youtube';
      if (u.includes('drive.google')) return 'fab fa-google-drive';
      if (u.includes('docs.google')) return 'fas fa-file-alt';
      if (u.includes('sheets.google')) return 'fas fa-table';
      if (u.includes('tiktok')) return 'fab fa-tiktok';
      if (u.includes('facebook')) return 'fab fa-facebook';
      if (u.includes('instagram')) return 'fab fa-instagram';
      if (u.includes('telegram')) return 'fab fa-telegram';
      if (u.includes('whatsapp')) return 'fab fa-whatsapp';
      if (u.includes('pornhub/')) return 'fab fa-pornhub';
      if (u.includes('linkedin')) return 'fab fa-linkedin';
      if (u.includes('lovable')) return 'fas fa-heart';
      if (u.includes('poki') || u.includes('game')) return 'fas fa-gamepad';
      return 'fas fa-link';
    }

    // ---- RENDER ----
    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const categoryFilter = document.getElementById('categoryFilter').value;
      const sortVal = document.getElementById('sortFilter').value;

      const catSet = new Set();
      links.forEach(l => { if (l.category) catSet.add(l.category); });
      const catSelect = document.getElementById('categoryFilter');
      const currentCat = catSelect.value;
      catSelect.innerHTML = '<option value="all">All categories</option>';
      [...catSet].sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        catSelect.appendChild(opt);
      });
      if ([...catSet].includes(currentCat)) catSelect.value = currentCat;
      else catSelect.value = 'all';

      let filtered = links.filter(link => {
        const matchSearch = link.title.toLowerCase().includes(search) || 
                           (link.tags && link.tags.some(t => t.toLowerCase().includes(search))) ||
                           (link.description && link.description.toLowerCase().includes(search));
        const matchCategory = categoryFilter === 'all' || link.category === categoryFilter;
        return matchSearch && matchCategory;
      });

      if (sortVal === 'newest') filtered.sort((a,b) => b.createdAt - a.createdAt);
      else if (sortVal === 'oldest') filtered.sort((a,b) => a.createdAt - b.createdAt);
      else if (sortVal === 'alpha') filtered.sort((a,b) => a.title.localeCompare(b.title));

      document.getElementById('totalCount').textContent = links.length;
      document.getElementById('categoryCount').textContent = getCategoryCount();
      document.getElementById('favCount').textContent = getFavCount();
      document.getElementById('newestLabel').textContent = getNewestTitle();

      const grid = document.getElementById('linkGrid');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map(link => {
        const icon = getPlatformIcon(link.url, link.icon);
        const favStar = link.favorite ? 'text-yellow-400' : 'text-gray-300 dark:text-gray-600';
        const tagsHtml = (link.tags && link.tags.length) ? link.tags.map(t => `<span class="tag-pill">#${t}</span>`).join(' ') : '';
        const dateStr = new Date(link.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const isProtected = link.linkPassword && link.linkPassword.trim() !== '';
        const lockBadge = isProtected ? `<span class="lock-badge"><i class="fas fa-lock"></i> Protected</span>` : '';
        
        return `
          <div class="glass rounded-3xl p-5 card-hover dark:glass-dark flex flex-col" onclick="handleLinkClick('${link.id}')">
            <div class="flex items-start justify-between">
              <div class="flex items-center gap-3">
                <div class="icon-bg"><i class="${icon}"></i></div>
                <div>
                  <h4 class="font-semibold text-gray-800 dark:text-white">${link.title}</h4>
                  <span class="text-xs text-gray-400 dark:text-gray-400">${link.category || 'Uncategorized'}</span>
                </div>
              </div>
              <div class="flex items-center gap-1">
                ${lockBadge}
                <i class="fas fa-star ${favStar} text-sm"></i>
              </div>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-300 mt-2 line-clamp-2">${link.description || 'No description'}</p>
            <div class="flex flex-wrap gap-1 mt-2">${tagsHtml}</div>
            <div class="flex items-center justify-between mt-4 text-xs text-gray-400 dark:text-gray-500">
              <span><i class="far fa-calendar-alt mr-1"></i>${dateStr}</span>
              <div class="flex gap-2">
                <button onclick="event.stopPropagation(); copyLink('${link.url}')" class="hover:text-blue-500 p-1" title="Copy Link"><i class="fas fa-copy"></i></button>
                <button onclick="event.stopPropagation(); handleLinkClick('${link.id}')" class="hover:text-blue-500 p-1" title="${isProtected ? '🔒 Unlock' : 'Open Link'}">
                  <i class="${isProtected ? 'fas fa-lock' : 'fas fa-external-link-alt'}"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ---- HANDLE LINK CLICK ----
    function handleLinkClick(id) {
      const link = links.find(l => l.id === id);
      if (!link) return;

      if (link.linkPassword && link.linkPassword.trim() !== '') {
        showLinkPasswordModal(link);
      } else {
        window.open(link.url, '_blank');
      }
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        showToast('✅ Link copied to clipboard!');
      }).catch(() => {
        prompt('📋 Copy this URL:', url);
      });
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = 'all';
      document.getElementById('sortFilter').value = 'newest';
      render();
    }

    // ---- THEME ----
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark') ? 'true' : 'false');
    }

    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
      document.body.classList.add('dark');
    }

    // ---- EVENT LISTENERS ----
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('categoryFilter').addEventListener('change', render);
    document.getElementById('sortFilter').addEventListener('change', render);

    document.getElementById('linkPasswordModal').addEventListener('click', function(e) {
      if (e.target === this) closeLinkPasswordModal();
    });

    document.getElementById('linkPasswordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyLinkPassword();
    });

    // ---- START ----
    loadLinks();
    console.log('✅ HTET LINK APP (Read Only) started!');
    console.log('📊 Total links:', links.length);
  </script>
</body>
